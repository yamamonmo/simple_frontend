<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CSSでデザインを変えてみよう</title>
        <link rel="stylesheet" type="text/css" href="style.css" />
    </head>
    <body>
        <div class="container">
            <h1>HTMLとCSSの基本：classで見た目を変えよう</h1>
            <p>
                <code>&lt;div&gt;</code> 要素に様々な
                <code>class</code>
                を追加して、デザインがどう変化するか確認してみましょう。
            </p>

            <!-- セクション1: 基本 -->
            <h2>1. 基本のボックス</h2>
            <span class="code-label">class="box"</span>
            <div class="box">
                これが基本のボックスです。薄いグレーの背景と余白が設定されています。
            </div>
        </div>
    </body>
</html>
